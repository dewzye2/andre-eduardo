<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contato</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <nav>
                <div class="logo">André Eduardo</div>
                <div class="ham" onclick="toggleMenu()">&#9776;</div>
                <div class="menu">
                    <a href="sobre.html">Sobre</a>
                    <a href="formacao.html">Formação</a>
                    <a href="portfolio.html">Portfólio</a>
                    <a href="contato.html">Contato</a>
                </div>
            </nav>
        </header>
        <main>
            <h1>Entre em Contato</h1>

            <p class="contato-texto">
                Gostou do meu portfólio ou deseja conversar comigo? Preencha o
                formulário abaixo. Esta página possui uma simulação de envio,
                conforme solicitado na atividade.
            </p>

            <div class="contato-card">
                <form id="formContato">
                    <div class="input-group">
                        <label for="nome">Nome</label>
                        <input
                            type="text"
                            id="nome"
                            placeholder="Digite seu nome"
                        />
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="Digite seu e-mail"
                        />
                    </div>

                    <div class="input-group">
                        <label for="mensagem">Mensagem</label>
                        <textarea
                            id="mensagem"
                            rows="6"
                            placeholder="Digite sua mensagem..."
                        ></textarea>
                    </div>

                    <button type="submit" class="btn-enviar">
                        Enviar Mensagem
                    </button>
                </form>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
